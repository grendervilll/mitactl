<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}mita panel{% endblock %}</title>
<style>
:root{--bg:#0d0f14;--surface:#141720;--surface2:#1c2030;--border:#252a3a;
  --accent:#4f8fff;--accent2:#7b5fff;--ok:#3ecf8e;--warn:#f5a623;
  --danger:#ff5f6d;--text:#e2e8f4;--muted:#6b7594;
  --mono:'JetBrains Mono','Fira Mono',monospace;--sans:'Inter',system-ui,sans-serif;
  --radius:10px;--radius-lg:16px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;font-size:15px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100%;display:flex}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:28px 0 20px;position:fixed;top:0;left:0;height:100vh;z-index:100}
.sidebar-logo{font-size:1.2rem;font-weight:700;color:var(--text);padding:0 24px 28px;display:flex;align-items:center;gap:10px}
.logo-badge{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  font-size:.75rem;font-weight:700;padding:4px 8px;border-radius:6px;letter-spacing:.5px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 24px;color:var(--muted);
  text-decoration:none;font-size:.875rem;font-weight:500;
  border-top:none;border-right:none;border-bottom:none;border-left:3px solid transparent;
  background:none;width:100%;text-align:left;transition:.15s;cursor:pointer}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(79,143,255,.08)}
.nav-icon{width:18px;height:18px;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:16px 24px;border-top:1px solid var(--border)}
.sidebar-footer a{color:var(--muted);font-size:.8rem;text-decoration:none}
.sidebar-footer a:hover{color:var(--danger)}
.main{margin-left:220px;flex:1;padding:36px 40px;min-height:100vh}
.page{display:none}.page.active{display:block}
h1{font-size:1.5rem;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.subtitle{color:var(--muted);font-size:.875rem;margin-bottom:28px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px}
.card-title{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.stat-label{font-size:.75rem;color:var(--muted);font-weight:500;margin-bottom:8px;text-transform:uppercase;letter-spacing:.6px}
.stat-value{font-size:1.75rem;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1}
.stat-value.accent{color:var(--accent)}.stat-value.ok{color:var(--ok)}
.stat-sub{font-size:.75rem;color:var(--muted);margin-top:6px}
.ip-badge{font-family:var(--mono);font-size:.8rem;background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:6px;color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:var(--radius);
  font-size:.875rem;font-weight:600;border:1px solid transparent;cursor:pointer;transition:.15s;text-decoration:none;white-space:nowrap;font-family:var(--sans)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-primary:hover{background:#3d7aff}
.btn-secondary{background:var(--surface2);color:var(--text);border-color:var(--border)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger)}.btn-danger:hover{background:var(--danger);color:#fff}
.btn-ok{background:var(--ok);color:#0d0f14;border-color:var(--ok)}.btn-ok:hover{background:#2fb87a}
.btn-warn{background:var(--warn);color:#0d0f14;border-color:var(--warn)}
.btn-sm{padding:5px 12px;font-size:.8rem}.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.form-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:160px}
label{font-size:.8rem;font-weight:500;color:var(--muted)}
input,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:9px 12px;border-radius:var(--radius);font-size:.875rem;font-family:var(--sans);width:100%;outline:none;transition:.15s}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,143,255,.15)}
select option{background:var(--surface2)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.875rem}
th{text-align:left;color:var(--muted);font-size:.75rem;font-weight:600;text-transform:uppercase;
  letter-spacing:.6px;padding:10px 12px;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid rgba(37,42,58,.6);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-ok{background:rgba(62,207,142,.15);color:var(--ok)}
.badge-warn{background:rgba(245,166,35,.15);color:var(--warn)}
.badge-off{background:var(--surface2);color:var(--muted)}
.toggle{position:relative;display:inline-block;width:38px;height:22px}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:22px;cursor:pointer;transition:.2s}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider::before{transform:translateX(16px)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:28px;max-width:700px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-title{font-size:1.1rem;font-weight:700;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;padding:4px;line-height:1}
.modal-close:hover{color:var(--danger)}
.code-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;font-family:var(--mono);font-size:.78rem;color:var(--ok);
  overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:260px;overflow-y:auto}
.accordion-item{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.accordion-header{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  background:var(--surface2);font-weight:600;font-size:.875rem;user-select:none}
.accordion-header:hover{background:var(--border)}
.accordion-body{display:none;padding:16px;background:var(--surface)}
.accordion-body.open{display:block}
.accordion-arrow{transition:.2s;color:var(--muted);display:inline-block}
.accordion-header.aopen .accordion-arrow{transform:rotate(180deg)}
.alert{padding:12px 16px;border-radius:var(--radius);font-size:.875rem;margin-bottom:16px}
.alert-ok{background:rgba(62,207,142,.12);border:1px solid rgba(62,207,142,.3);color:var(--ok)}
.alert-err{background:rgba(255,95,109,.12);border:1px solid rgba(255,95,109,.3);color:var(--danger)}
.alert-warn{background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.3);color:var(--warn)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:var(--border);margin:24px 0}
.row-actions{display:flex;gap:8px;align-items:center}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-badge">MITA</div>Panel
  </div>
  <button class="nav-item active" onclick="showPage('dashboard',this)">
    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Дашборд
  </button>
  <button class="nav-item" onclick="showPage('users',this)">
    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    Пользователи
  </button>
  <button class="nav-item" onclick="showPage('ssl',this)">
    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
    SSL
  </button>
  <button class="nav-item" onclick="showPage('security',this)">
    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
    Безопасность
  </button>
  <div class="sidebar-footer"><a href="{{ base }}/logout">Выйти</a></div>
</nav>
<main class="main">{% block content %}{% endblock %}</main>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-title-text"></span>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>
<div id="toast" style="position:fixed;bottom:24px;right:24px;z-index:999;display:none;
  background:var(--surface2);border:1px solid var(--border);color:var(--ok);
  padding:10px 18px;border-radius:8px;font-size:.85rem;transition:.2s"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4fn5L1La6DVFOZmF+Rd+g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
const BASE="{{ base }}";
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn)btn.classList.add('active');
  if(id==='dashboard')loadDashboard();
  if(id==='users')loadUsers();
  if(id==='ssl')loadSSL();
  if(id==='security')loadSecurityPage();
}
function openModal(title,html){
  document.getElementById('modal-title-text').textContent=title;
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
async function api(path,method='GET',body=null){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(BASE+path,opts);
  if(r.status===401){location.href=BASE+'/login';return null;}
  return r.json();
}
function showToast(msg,isErr=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.color=isErr?'var(--danger)':'var(--ok)';
  t.style.display='block';setTimeout(()=>t.style.display='none',2500);
}
function copyText(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast('Скопировано ✓')).catch(()=>_copyFallback(text));
  }else{_copyFallback(text);}
}
function _copyFallback(text){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');showToast('Скопировано ✓');}
  catch(e){showToast('Ошибка копирования',true);}
  document.body.removeChild(ta);
}
function toggleAccordion(hdr){
  hdr.classList.toggle('aopen');
  hdr.nextElementSibling.classList.toggle('open');
}
function codeBlock(json){
  const txt=JSON.stringify(json,null,2);
  return `<div class="code-block" id="cb_${Math.random().toString(36).slice(2)}">${escHtml(txt)}</div>
    <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="copyText(${escAttr(txt)})">Копировать</button>`;
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return "'"+s.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+"'";}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
